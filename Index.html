<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sharma Pizza Delivery</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

header{
    background:#ff4500;
    color:white;
    text-align:center;
    padding:20px;
}

.hero{
    text-align:center;
    padding:40px;
}

.hero img{
    width:300px;
    border-radius:10px;
}

.menu{
    padding:20px;
}

.pizza-card{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    background:#ff4500;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

footer{
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
    <h1>🍕 sharma Pizza Delivery</h1>
    <p>Fresh & Hot Pizza At Your Doorstep</p>
</header>

<section class="hero">
    <h2>Order Your Favourite Pizza</h2>
    <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591" alt="Pizza">
</section>

<section class="menu">
    <h2>Our Menu</h2>

    <div class="pizza-card">
        <h3>Margherita Pizza</h3>
        <p>Price: ₹199</p>
        <button>Order Now</button>
    </div>

    <div class="pizza-card">
        <h3>Veggie Pizza</h3>
        <p>Price: ₹249</p>
        <button>Order Now</button>
    </div>

    <div class="pizza-card">
        <h3>Cheese Burst Pizza</h3>
        <p>Price: ₹299</p>
        <button>Order Now</button>
    </div>
</section>

<footer>
    <p>📞 Contact: 7374887595</p>
    <p>© 2026 sharma Pizza Delivery</p>
</footer>

</body>
</html>
